trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'ubuntu-latest'
  
variables:
  dockerRegistryServiceConnection: 'AzureContainerRegistry'
  containerRegistry: 'acrproject400eunan.azurecr.io'
  imageRepositoryAPI: 'project400api'
  imageRepositoryWeb: 'project400web'
  dockerfilePathAPI: '$(Build.SourcesDirectory)/Project400API/Dockerfile'
  dockerfilePathWeb: '$(Build.SourcesDirectory)/Project400Web/Dockerfile'
  tag: '$(Build.BuildId)'
  resourceGroup: 'Project400ResourceGroup'
  apiContainerApp: 'ca-project400-api'
  webContainerApp: 'ca-project400-web'

stages:
- stage: Test
  displayName: Run Unit Tests
  jobs:
  - job: Test
    displayName: Run Tests
    steps:
    - task: UseDotNet@2
      displayName: Install .NET 8 SDK
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - task: DotNetCoreCLI@2
      displayName: Restore NuGet Packages
      inputs:
        command: 'restore'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: Build Solution
      inputs:
        command: 'build'
        projects: '**/*.csproj'
        arguments: '--configuration Release --no-restore'

    - task: DotNetCoreCLI@2
      displayName: Run Unit Tests
      inputs:
        command: 'test'
        projects: '**/Project400Tests.csproj'
        arguments: '--configuration Release --no-build'

    - task: PublishTestResults@2
      displayName: Publish Test Results
      condition: always()
      inputs:
        testResultsFormat: 'VSTest'
        testResultsFiles: '$(Agent.TempDirectory)/*.trx'
        testRunTitle: 'Project400 Unit Tests'

- stage: Build
  displayName: Build and Push Images
  dependsOn: Test
  jobs:
  - job: Build
    displayName: Build Docker Images
    steps:
    - task: Docker@2
      displayName: Build and Push API Image
      inputs:
        command: buildAndPush
        repository: $(imageRepositoryAPI)
        dockerfile: $(dockerfilePathAPI)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
        buildContext: $(Build.SourcesDirectory)

    - task: Docker@2
      displayName: Build and Push Web Image
      inputs:
        command: buildAndPush
        repository: $(imageRepositoryWeb)
        dockerfile: $(dockerfilePathWeb)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
        buildContext: $(Build.SourcesDirectory)

- stage: Deploy
  displayName: Deploy to Azure Container Apps
  dependsOn: Build
  jobs:
  - deployment: DeployAPI
    displayName: Deploy API Container App
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: Deploy API to Container App
            inputs:
              azureSubscription: 'AzureServiceConnection'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: az containerapp update --name $(apiContainerApp) --resource-group $(resourceGroup) --image $(containerRegistry)/$(imageRepositoryAPI):$(tag)

  - deployment: DeployWeb
    displayName: Deploy Web Container App
    environment: 'production'
    dependsOn: DeployAPI
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: Deploy Web to Container App
            inputs:
              azureSubscription: 'AzureServiceConnection'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: az containerapp update --name $(webContainerApp) --resource-group $(resourceGroup) --image $(containerRegistry)/$(imageRepositoryWeb):$(tag)